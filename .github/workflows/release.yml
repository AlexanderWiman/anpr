name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v2026.07.05.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          AGENT_VERSION=$(grep -E '^__version__\s*=' src/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$TAG" =~ ^v([0-9]{4})\.([0-9]{2})\.([0-9]{2})\.([0-9]+)$ ]]; then
            ZIP="anpr-edge-agent-${BASH_REMATCH[1]}${BASH_REMATCH[2]}${BASH_REMATCH[3]}.${BASH_REMATCH[4]}.zip"
          else
            ZIP="anpr-edge-agent-${TAG#v}.zip"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "agent_version=$AGENT_VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0

      - name: Build zip
        run: git archive --format=zip --output "${{ steps.meta.outputs.zip }}" "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ANPR Edge Agent ${{ steps.meta.outputs.agent_version }} (${{ steps.meta.outputs.tag }})
          files: ${{ steps.meta.outputs.zip }}
          generate_release_notes: true

      - name: Install Railway CLI
        if: ${{ secrets.RAILWAY_TOKEN != '' || secrets.RAILWAY_API_TOKEN != '' }}
        run: npm install -g @railway/cli@4

      - name: Update Railway download URL
        if: ${{ secrets.RAILWAY_TOKEN != '' || secrets.RAILWAY_API_TOKEN != '' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: cd64c4cd-2eba-4cd5-b258-bb71274bdb50
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          ZIP="${{ steps.meta.outputs.zip }}"
          VERSION="${{ steps.meta.outputs.agent_version }}"
          DOWNLOAD_URL="https://github.com/AlexanderWiman/anpr/releases/download/${TAG}/${ZIP}"
          railway variable set \
            "ANPR_AGENT_LATEST_VERSION=${VERSION}" \
            "ANPR_AGENT_DOWNLOAD_URL=${DOWNLOAD_URL}" \
            --service backend \
            --environment production \
            --project "${RAILWAY_PROJECT_ID}"
          echo "Railway backend: version ${VERSION}, download ${DOWNLOAD_URL}"
