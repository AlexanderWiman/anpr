name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v2026.07.05.1)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          AGENT_VERSION=$(grep -E '^__version__\s*=' src/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$TAG" =~ ^v([0-9]{4})\.([0-9]{2})\.([0-9]{2})\.([0-9]+)$ ]]; then
            ZIP="anpr-edge-agent-${BASH_REMATCH[1]}${BASH_REMATCH[2]}${BASH_REMATCH[3]}.${BASH_REMATCH[4]}.zip"
          else
            ZIP="anpr-edge-agent-${TAG#v}.zip"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "agent_version=$AGENT_VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0

      - name: Build zip
        run: git archive --format=zip --output "${{ steps.meta.outputs.zip }}" "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ANPR Edge Agent ${{ steps.meta.outputs.agent_version }} (${{ steps.meta.outputs.tag }})
          files: ${{ steps.meta.outputs.zip }}
          generate_release_notes: true
